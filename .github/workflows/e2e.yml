name: NocoBase E2E Worker

run-name: E2E ${{ inputs.targets }} @ ${{ inputs.nocobase_version }} ${{ inputs.dispatch_id }}

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "'*' for all packages, or comma-separated E2E package names"
        required: true
        default: plugin-block-iframe
      nocobase_version:
        description: "NocoBase Docker version/tag, for example: next, develop, main, pr-123"
        required: true
        default: next
      e2e_repo:
        description: "Private E2E repository to checkout"
        required: true
        default: nocobase/e2e
      e2e_ref:
        description: "Branch, tag, or SHA in the E2E repository"
        required: true
        default: main
      nocobase_docker_image:
        description: "Optional override for vars.NOCOBASE_DOCKER_IMAGE"
        required: false
        default: ""
      docker_registry:
        description: "Optional override for vars.DOCKER_REGISTRY"
        required: false
        default: ""
      dry_run:
        description: "Resolve targets only; do not install dependencies or run tests"
        required: true
        type: boolean
        default: true
      dispatch_id:
        description: "Optional caller-provided id used to correlate cross-repository dispatches"
        required: false
        default: ""
      caller_repo:
        description: "Optional caller repository, for example nocobase/e2e"
        required: false
        default: ""
      caller_run_id:
        description: "Optional caller GitHub Actions run id"
        required: false
        default: ""
      caller_sha:
        description: "Optional caller commit SHA"
        required: false
        default: ""

jobs:
  resolve-targets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      count: ${{ steps.resolve-targets.outputs.count }}
      packages_json: ${{ steps.resolve-targets.outputs.packages_json }}
      matrix: ${{ steps.resolve-targets.outputs.matrix }}
    env:
      TARGETS: ${{ inputs.targets }}
      NOCOBASE_DOCKER_VERSION: ${{ inputs.nocobase_version }}
      NOCOBASE_DOCKER_IMAGE: ${{ inputs.nocobase_docker_image || vars.NOCOBASE_DOCKER_IMAGE }}
      DOCKER_REGISTRY: ${{ inputs.docker_registry || vars.DOCKER_REGISTRY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout worker repo
        uses: actions/checkout@v4

      - name: Validate configuration
        env:
          NOCOBASE_E2E_TOKEN: ${{ secrets.NOCOBASE_E2E_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          require() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::Missing required configuration: $name"
              missing=1
            fi
          }

          require NOCOBASE_E2E_TOKEN

          if [ "$DRY_RUN" != "true" ]; then
            require DOCKER_REGISTRY
            require DOCKER_USERNAME
            require DOCKER_PASSWORD
            require NOCOBASE_DOCKER_IMAGE
            require NOCOBASE_DOCKER_VERSION
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Configuration OK"

      - name: Checkout E2E repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.e2e_repo }}
          ref: ${{ inputs.e2e_ref }}
          path: e2e
          token: ${{ secrets.NOCOBASE_E2E_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve E2E targets
        id: resolve-targets
        shell: bash
        run: |
          set -euo pipefail
          node scripts/resolve-targets.mjs \
            --repo-dir e2e \
            --targets "$TARGETS" \
            --output "$RUNNER_TEMP/e2e-targets.txt" \
            --github-output "$GITHUB_OUTPUT"

      - name: Print dry-run summary
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Dry run enabled. Resolved packages:"
          cat "$RUNNER_TEMP/e2e-targets.txt"
          echo
          echo "No dependencies were installed and no tests were executed."

  test:
    needs: resolve-targets
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    env:
      TARGETS: ${{ inputs.targets }}
      E2E_REPO: ${{ inputs.e2e_repo }}
      E2E_REF: ${{ inputs.e2e_ref }}
      NOCOBASE_DOCKER_VERSION: ${{ inputs.nocobase_version }}
      NOCOBASE_DOCKER_IMAGE: ${{ inputs.nocobase_docker_image || vars.NOCOBASE_DOCKER_IMAGE }}
      DOCKER_REGISTRY: ${{ inputs.docker_registry || vars.DOCKER_REGISTRY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      PACKAGE_DIR: ${{ matrix.package_dir }}
      PACKAGE_NAME: ${{ matrix.package_name }}

    steps:
      - name: Checkout worker repo
        id: checkout-worker
        uses: actions/checkout@v4

      - name: Checkout E2E repo
        id: checkout-e2e
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.e2e_repo }}
          ref: ${{ inputs.e2e_ref }}
          path: e2e
          token: ${{ secrets.NOCOBASE_E2E_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Mark package start
        shell: bash
        run: echo "PACKAGE_STARTED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Install E2E dependencies
        id: install
        working-directory: e2e
        shell: bash
        run: |
          set -euo pipefail
          npm install -g yarn
          yarn install

      - name: Run selected E2E package
        id: run
        continue-on-error: true
        shell: bash
        run: scripts/run-target.sh "$PACKAGE_DIR"

      - name: Upload Playwright HTML report
        id: upload-playwright-report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.package_name }}
          path: e2e/${{ matrix.package_dir }}/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        id: upload-test-results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.package_name }}
          path: e2e/${{ matrix.package_dir }}/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write package result
        if: ${{ always() }}
        shell: bash
        env:
          RESULT_FILE: ${{ runner.temp }}/e2e-result/result.json
          CHECKOUT_WORKER_OUTCOME: ${{ steps.checkout-worker.outcome }}
          CHECKOUT_E2E_OUTCOME: ${{ steps.checkout-e2e.outcome }}
          SETUP_NODE_OUTCOME: ${{ steps.setup-node.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          RUN_OUTCOME: ${{ steps.run.outcome }}
          PLAYWRIGHT_REPORT_ARTIFACT_ID: ${{ steps.upload-playwright-report.outputs.artifact-id }}
          PLAYWRIGHT_REPORT_ARTIFACT_URL: ${{ steps.upload-playwright-report.outputs.artifact-url }}
          TEST_RESULTS_ARTIFACT_ID: ${{ steps.upload-test-results.outputs.artifact-id }}
          TEST_RESULTS_ARTIFACT_URL: ${{ steps.upload-test-results.outputs.artifact-url }}
        run: node scripts/write-result.mjs

      - name: Upload package result
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-result-${{ matrix.package_name }}
          path: ${{ runner.temp }}/e2e-result/result.json
          if-no-files-found: error
          retention-days: 7

      - name: Fail package job when E2E failed
        if: ${{ always() && steps.run.outcome != 'success' }}
        shell: bash
        run: |
          echo "::error::E2E package failed: $PACKAGE_DIR"
          exit 1

  notify:
    needs: [resolve-targets, test]
    if: ${{ always() && !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGETS: ${{ inputs.targets }}
      TARGET_MATRIX: ${{ needs.resolve-targets.outputs.matrix }}
      NOCOBASE_DOCKER_VERSION: ${{ inputs.nocobase_version }}
      E2E_REPO: ${{ inputs.e2e_repo }}
      E2E_REF: ${{ inputs.e2e_ref }}
      RESOLVE_RESULT: ${{ needs.resolve-targets.result }}
      TEST_RESULT: ${{ needs.test.result }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      DISPATCH_ID: ${{ inputs.dispatch_id }}
      CALLER_REPO: ${{ inputs.caller_repo }}
      CALLER_RUN_ID: ${{ inputs.caller_run_id }}
      CALLER_SHA: ${{ inputs.caller_sha }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}

    steps:
      - name: Checkout worker repo
        uses: actions/checkout@v4

      - name: Download package results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: e2e-result-*
          path: results

      - name: Summarize and notify Feishu
        shell: bash
        run: node scripts/notify-feishu.mjs --results-dir results --summary-file "$GITHUB_STEP_SUMMARY"
